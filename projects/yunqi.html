<style>

  nav{display:flex;align-items:center;justify-content:space-between;height:78px}
  .brand{display:inline-flex;align-items:center;gap:11px;font-size:13px;letter-spacing:.36em;font-weight:600}
  .brand .mk{width:30px;height:30px;display:block;flex:0 0 auto;object-fit:contain}
  .brand span{color:var(--ink-soft);font-weight:400}
  .back{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);transition:color .25s}
  .back:hover{color:var(--ink)}

  .intro{padding:84px 0 56px}
  .intro .label{margin-bottom:26px}
  .intro h1{font-weight:600;font-size:clamp(34px,5vw,68px);letter-spacing:-.02em;line-height:1.08}
  .meta{margin-top:30px;display:flex;gap:40px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:26px}
  .meta div{font-size:14px}
  .meta .k{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:6px}
  .intro p{margin-top:34px;max-width:60ch;font-size:19px;color:#403c35;line-height:1.6;letter-spacing:-.012em}

  .gallery{padding:30px 0 90px}
  .gallery .wrap{display:grid;grid-template-columns:1fr 1fr;gap:30px}
  .gallery figure{margin:0;overflow:hidden;background:var(--bg-soft)}
  .gallery img{width:100%;height:100%;object-fit:cover;aspect-ratio:3/2;transition:transform .9s cubic-bezier(.2,.8,.2,1);cursor:zoom-in}
  .gallery figure:hover img{transform:scale(1.03)}
  .gallery .wide{grid-column:1 / -1}
  .gallery .wide img{aspect-ratio:16/8}

  .lb{position:fixed;inset:0;z-index:100;background:rgba(20,19,17,.95);display:none;align-items:center;justify-content:center;padding:30px}
  .lb.open{display:flex}
  .lb img{max-width:92vw;max-height:90vh;width:auto;height:auto;object-fit:contain;aspect-ratio:auto;cursor:default}
  .lb .x{position:absolute;top:20px;right:28px;font-size:30px;color:#fff;cursor:pointer;line-height:1;opacity:.8}
  .lb .x:hover{opacity:1}
  .lb .nav{position:absolute;top:50%;transform:translateY(-50%);font-size:44px;color:#fff;cursor:pointer;opacity:.55;user-select:none;padding:10px 20px}
  .lb .nav:hover{opacity:1}
  .lb .prev{left:6px}.lb .next{right:6px}
  .lb .count{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#fff;font-size:12px;letter-spacing:.22em;opacity:.7}

  .foot{border-top:1px solid var(--line);padding:50px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px}
  .foot .cr{font-size:11px;letter-spacing:.16em;color:var(--ink-soft)}
  .foot a{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft)}
  .foot a:hover{color:var(--ink)}

  @media(max-width:900px){
    .wrap{padding:0 24px}
    .intro{padding:56px 0 40px}
    .gallery .wrap{grid-template-columns:1fr;gap:18px}
    .gallery .wide img,.gallery img{aspect-ratio:3/2}
    .lb .nav{font-size:34px;padding:8px 12px}
  }
</style>

<div class="lb" id="lb">
  <span class="x" id="lbx" aria-label="关闭">×</span>
  <span class="nav prev" id="lbprev" aria-label="上一张">‹</span>
  <img id="lbimg" src="" alt="">
  <span class="nav next" id="lbnext" aria-label="下一张">›</span>
  <div class="count" id="lbcount"></div>
</div>
<script>
  document.getElementById('year').textContent=new Date().getFullYear();
  var imgs=[].slice.call(document.querySelectorAll('.gallery img'));
  var lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg'),lbcount=document.getElementById('lbcount'),idx=0;
  function show(i){idx=(i+imgs.length)%imgs.length;lbimg.src=imgs[idx].src;lbcount.textContent=(idx+1)+' / '+imgs.length;}
  function open(i){show(i);lb.classList.add('open');document.body.style.overflow='hidden';}
  function close(){lb.classList.remove('open');document.body.style.overflow='';}
  imgs.forEach(function(im,i){im.addEventListener('click',function(){open(i);});});
  document.getElementById('lbx').addEventListener('click',close);
  document.getElementById('lbprev').addEventListener('click',function(e){e.stopPropagation();show(idx-1);});
  document.getElementById('lbnext').addEventListener('click',function(e){e.stopPropagation();show(idx+1);});
  lb.addEventListener('click',function(e){if(e.target===lb)close();});
  document.addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;if(e.key==='Escape')close();else if(e.key==='ArrowLeft')show(idx-1);else if(e.key==='ArrowRight')show(idx+1);});
</script>
